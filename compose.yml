services:
  postgres:
    image: postgis/postgis:16-master
    container_name: PostgresDB
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=incidentdb
    volumes:
      - postgresdb_data:/var/lib/postgresql

  redis:
    image: redis
    container_name: incident-redis
    ports:
      - 6379:6379
    volumes:
      - redis_db:/data

volumes:
  postgresdb_data:
  redis_db: