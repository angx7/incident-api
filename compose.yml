services:
  incident-api:
    image: ghcr.io/angx7/incident-api:latest
    container_name: IncidentAPI
    ports:
      - 3000:8080
    environment:
      - PORT=${PORT}
      - MAILER_EMAIL=${MAILER_EMAIL}
      - MAILER_SERVICE=${MAILER_SERVICE}
      - MAILER_PASSWORD=${MAILER_PASSWORD}
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - APPINSIGHTS_CONNECTION_STRING=${APPINSIGHTS_CONNECTION_STRING}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}

  postgres:
    image: postgis/postgis:16-master
    container_name: PostgresDB
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=incidentdb
    volumes:
      - postgresdb_data:/var/lib/postgresql

  redis:
    image: redis
    container_name: incident-redis
    ports:
      - 6379:6379
    volumes:
      - redis_db:/data

volumes:
  postgresdb_data:
  redis_db: